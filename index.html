<script>
    // === 追蹤清單 ===
    const watchlist = [
        { id: '^TWII', name: '加權指數' },
        { id: '2383.TW', name: '2383 台光電' },
        { id: '00989A.TW', name: '00989A 摩根美國科技' },
        { id: '00982A.TW', name: '00982A 群益台灣強棒' },
        { id: '00949.TW', name: '00949 復華日本龍頭' },
        { id: '009805.TW', name: '009805 新光美國電力基建息收' },
        { id: '00919.TW', name: '00919 群益精選高息' },
        { id: '00923.TW', name: '00923 群益ESG低碳' },
        { id: 'JPY=X', name: '美元/日元' },
        { id: 'JPYTWD=X', name: '日元/台幣' }
    ];

    const proxyBase = "https://corsproxy.io/?";
    const container = document.getElementById('container');
    const debugLog = document.getElementById('debug-log');

    function isTWStock(id) {
        return id.endsWith('.TW') || id === '^TWII';
    }

    function convertToMisSymbol(id) {
        if (id === '^TWII') return 'tse_t00.tw';
        if (id.endsWith('.TW')) return `tse_${id.replace('.TW', '')}.tw`;
        return null;
    }

    function log(msg) {
        debugLog.innerHTML += msg + "<br>";
        const lines = debugLog.innerHTML.split("<br>");
        if (lines.length > 8) debugLog.innerHTML = lines.slice(-8).join("<br>");
    }

    function toggleDebug() {
        debugLog.style.display = debugLog.style.display === 'none' ? 'block' : 'none';
    }

    function init() {
        container.innerHTML = watchlist.map(item => `
            <div class="card" id="card-${item.id}">
                <div class="card-top">
                    <div class="info">
                        <h2>${item.name}</h2>
                        <p>${item.id}</p>
                    </div>
                    <div class="data">
                        <div class="price" style="color:#666; font-size:14px;">更新中...</div>
                    </div>
                </div>
                <div class="chart-area" id="chart-${item.id}">
                    <div style="font-size:10px; color:#555; padding-top:15px; text-align:center;">走勢載入中...</div>
                </div>
            </div>
        `).join('');
    }

    async function fetchData() {
        log("開始更新...");
        const twStocks = watchlist.filter(item => isTWStock(item.id));

        // 1. 台股價格用 mis.twse
        const priceMap = new Map();
        if (twStocks.length > 0) {
            const symbols = twStocks.map(item => convertToMisSymbol(item.id)).join('|');
            const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${symbols}&json=1&delay=0&_=${Date.now()}`;
            try {
                const res = await fetch(proxyBase + encodeURIComponent(url));
                if (res.ok) {
                    const json = await res.json();
                    json.msgArray.forEach(stock => {
                        const id = stock.ch.includes('t00') ? '^TWII' : `${stock.c}.TW`;
                        const price = parseFloat(stock.z && stock.z.trim() !== '-' ? stock.z : stock.y) || 0;
                        const prev = parseFloat(stock.y) || price;
                        priceMap.set(id, {
                            price: price,
                            change: price - prev,
                            changePct: prev ? (price - prev) / prev * 100 : 0
                        });
                    });
                }
            } catch (e) { log('mis.twse 錯誤: ' + e.message); }
        }

        // 2. 抓所有走勢圖 (Yahoo 5m 線)
        const chartPromises = watchlist.map(async (item) => {
            try {
                const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${item.id}?interval=5m&range=1d&_=${Date.now()}`;
                const res = await fetch(proxyBase + encodeURIComponent(yahooUrl));
                if (!res.ok) throw new Error();
                const json = await res.json();
                const quote = json.chart.result[0].indicators.quote[0];
                let chartData = quote.close ? quote.close.filter(p => p != null && p !== undefined) : [];
                if (chartData.length < 2) chartData = [chartData[0] || 0, chartData[0] || 0];
                return { id: item.id, chartData };
            } catch (e) {
                log(`Chart ${item.id} 錯誤`);
                return { id: item.id, chartData: [] };
            }
        });

        const chartResults = await Promise.all(chartPromises);

        // 3. 合併並渲染
        chartResults.forEach(chart => {
            const card = document.getElementById(`card-${chart.id}`);
            if (!card) return;
            const priceInfo = priceMap.get(chart.id) || {
                price: chart.chartData[chart.chartData.length - 1] || 0,
                change: 0,
                changePct: 0
            };
            const div = card.querySelector('.data');
            const chartDiv = document.getElementById(`chart-${chart.id}`);

            const isUp = priceInfo.change > 0;
            const isDown = priceInfo.change < 0;
            const colorClass = isUp ? 'up' : (isDown ? 'down' : 'neutral');
            const strokeClass = isUp ? 'up-stroke' : (isDown ? 'down-stroke' : 'neutral-stroke');
            const sign = isUp ? '▲' : (isDown ? '▼' : '');
            const borderClass = isUp ? 'up-border' : (isDown ? 'down-border' : '');

            const fixed = chart.id.includes('=X') ? 4 : 2;
            card.className = `card ${borderClass}`;
            div.innerHTML = `
                <div class="price ${colorClass}">${priceInfo.price.toFixed(fixed)}</div>
                <div class="change ${colorClass}">
                    ${sign} ${Math.abs(priceInfo.change).toFixed(fixed)} (${Math.abs(priceInfo.changePct).toFixed(2)}%)
                </div>
            `;

            if (chart.chartData.length > 1) {
                chartDiv.innerHTML = generateSVG(chart.chartData, strokeClass);
            } else {
                chartDiv.innerHTML = '<div style="font-size:10px; color:#555; padding-top:15px; text-align:center;">走勢載入中...</div>';
            }
        });

        document.getElementById('last-update').innerHTML = 
            `最後更新: ${new Date().toLocaleTimeString('zh-TW')} (台北)`;
        log(`更新完成 ${new Date().toLocaleTimeString()}`);
    }

    function generateSVG(prices, strokeClass) {
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const range = max - min || 1;
        const width = 320;
        const height = 55;
        const points = prices.map((p, i) => {
            const x = (i / (prices.length - 1)) * width;
            const y = height - ((p - min) / range) * (height - 8) + 4;
            return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ");

        return `
            <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
                <polyline points="${points}" class="line-path ${strokeClass}" />
            </svg>
        `;
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('zh-TW', { hour12: false });

        const day = now.getDay();
        const min = now.getHours() * 60 + now.getMinutes();
        const isTrade = (day >= 1 && day <= 5 && min >= 540 && min <= 810);

        const badge = document.getElementById('status-badge');
        if (isTrade) {
            badge.className = 'status-badge live';
            badge.innerText = "盤中即時";
        } else {
            badge.className = 'status-badge sleep';
            badge.innerText = "休息中";
        }
    }

    // 啟動
    init();
    fetchData();
    setInterval(() => { if (updateClock()) fetchData(); }, 20000);  // 每20秒更新一次
    setInterval(updateClock, 1000);
</script>
